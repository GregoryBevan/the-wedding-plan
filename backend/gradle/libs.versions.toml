[versions]
mockk = "1.14.11"
test-containers = "2.0.5"
spring-boot = "4.0.6"
spring-dependency-management = "1.1.4"
assertk-jvm = "0.28.1"
uuid-creator = "6.1.0"
exposed = "1.3.0"

[libraries]
mockk = { module = "io.mockk:mockk", version.ref = "mockk" }
mockk-agent = { module = "io.mockk:mockk-agent", version.ref = "mockk" }
test-containers-bom = { module = "org.testcontainers:testcontainers-bom", version.ref = "test-containers" }
assertk-jvm = { module = "com.willowtreeapps.assertk:assertk-jvm", version.ref = "assertk-jvm"}
uuid-creator = { module = "com.github.f4b6a3:uuid-creator", version.ref = "uuid-creator" }
exposed-spring-boot = { module = "org.jetbrains.exposed:exposed-spring-boot4-starter", version.ref = "exposed" }
exposed-java-time = { module = "org.jetbrains.exposed:exposed-java-time", version.ref = "exposed"}

[plugins]
spring-boot = { id = "org.springframework.boot", version.ref = "spring-boot" }
spring-dependency-management = { id ="io.spring.dependency-management", version.ref = "spring-dependency-management" }