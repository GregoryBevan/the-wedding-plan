server:
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:none}

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:}
            client-secret: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:}
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}
          connectiontimeout: ${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${SPRING_MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${SPRING_MAIL_SMTP_WRITE_TIMEOUT:5000}

app:
  auth:
    allowed-emails: ${APP_AUTH_ALLOWED_EMAILS:}
    success-redirect-url: ${APP_AUTH_SUCCESS_REDIRECT_URL:}
    rate-limit:
      enabled: ${APP_AUTH_RATE_LIMIT_ENABLED:true}
      max-requests-per-window: ${APP_AUTH_RATE_LIMIT_MAX_REQUESTS_PER_WINDOW:60}
      window-seconds: ${APP_AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
  mail:
    from: ${APP_MAIL_FROM:no-reply@localhost}
    enabled: ${APP_MAIL_ENABLED:true}
  guest-access:
    base-url: ${APP_GUEST_ACCESS_BASE_URL:http://localhost:5174}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
    allowed-origin-patterns: []
    allowed-methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    allowed-headers: [Authorization, Content-Type, Accept, Origin, X-XSRF-TOKEN]
    allow-credentials: true
