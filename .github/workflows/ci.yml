name: The Wedding Plan CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    permissions:
      contents: read
      checks: write
      id-token: write

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
    - name: Cache Gradle packages
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - name: Build with Gradle and coverage
      run: ./gradlew clean build jacocoAllTestReport
      working-directory: backend
    - name: Publish backend test report
      if: ${{ always() }}
      uses: dorny/test-reporter@v3
      with:
        name: Backend Gradle Tests
        path: backend/build/test-results/**/TEST-*.xml
        reporter: java-junit
        fail-on-error: true
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: 'frontend/pnpm-lock.yaml'
    - name: Build Frontend
      env:
        VITE_API_BASE_URL: http://localhost:8080
      run: |
        pnpm install
        pnpm audit --audit-level=high
        pnpm run test:coverage
        pnpm run build
      working-directory: frontend
    - name: Upload coverage artifacts
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: |
          backend/build/reports/jacoco/jacocoAllTestReport/jacocoAllTestReport.xml
          backend/build/reports/jacoco/jacocoAllTestReport/jacocoAllTestReport.csv
          backend/build/reports/jacoco/jacocoAllTestReport/html/**
          frontend/coverage/cobertura-coverage.xml
          frontend/coverage/coverage-summary.json
    - name: Upload coverage to Codecov
      if: ${{ always() && env.CODECOV_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
      uses: codecov/codecov-action@v5
      continue-on-error: true
      with:
        token: ${{ env.CODECOV_TOKEN }}
        files: backend/build/reports/jacoco/jacocoAllTestReport/jacocoAllTestReport.xml,frontend/coverage/cobertura-coverage.xml
        fail_ci_if_error: false
        verbose: true
    - name: Skip Codecov upload (no token configured)
      if: ${{ always() && env.CODECOV_TOKEN == '' }}
      run: |
        echo "- Codecov upload skipped: CODECOV_TOKEN is not configured." >> "$GITHUB_STEP_SUMMARY"
    - name: Publish coverage links
      if: ${{ always() }}
      run: |
        {
          echo "## Coverage summary"
          echo ""
          echo "- Coverage artifacts are attached to this workflow run (artifact: \`coverage-reports\`)."
          echo "- Coverage is also published through Codecov (check details in the Codecov action/logs)."
        } >> "$GITHUB_STEP_SUMMARY"
