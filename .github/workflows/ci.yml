name: The Wedding Plan CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
    - name: Cache Gradle packages
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - name: Build with Gradle
      run: ./gradlew clean build
      working-directory: backend
    - name: Publish backend test report
      if: ${{ always() }}
      uses: dorny/test-reporter@v3
      with:
        name: Backend Gradle Tests
        path: backend/build/test-results/**/TEST-*.xml
        reporter: java-junit
        fail-on-error: true
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: 'frontend/pnpm-lock.yaml'
    - name: Build Frontend
      env:
        VITE_API_BASE_URL: http://localhost:8080
      run: |
        pnpm install
        pnpm audit --audit-level=high
        pnpm run test
        pnpm run build
      working-directory: frontend
