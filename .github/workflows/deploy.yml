name: Deploy to Render

on:
  workflow_run:
    workflows: ["The Wedding Plan CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - name: Validate deploy hook configuration
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

      - name: Verify tested commit is still main head and trigger deploy
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_API_URL: ${{ github.api_url }}
          GITHUB_TOKEN: ${{ github.token }}
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          CURRENT_MAIN_SHA="$(
            curl --fail --show-error --silent \
              --header "Authorization: Bearer $GITHUB_TOKEN" \
              --header "Accept: application/vnd.github+json" \
              "$GH_API_URL/repos/${{ github.repository }}/git/ref/heads/main" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["object"]["sha"])'
          )"

          if [ -z "$CURRENT_MAIN_SHA" ]; then
            echo "Unable to resolve refs/heads/main from origin"
            exit 1
          fi

          if [ "$CURRENT_MAIN_SHA" != "$EXPECTED_SHA" ]; then
            echo "Skipping deploy: tested SHA ($EXPECTED_SHA) is not current main SHA ($CURRENT_MAIN_SHA)."
            exit 0
          fi

          curl --fail --show-error --silent \
            --request POST \
            "$RENDER_DEPLOY_HOOK_URL"


