name: Deploy to Render

on:
  workflow_run:
    workflows: ["The Wedding Plan CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    steps:
      - name: Validate deploy hook configuration
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --show-error --silent \
            --request POST \
            "$RENDER_DEPLOY_HOOK_URL"

      - name: Publish deployment summary
        run: |
          {
            echo "## Deployment triggered"
            echo ""
            echo "- Render deploy hook was called successfully."
            echo "- Check Render dashboard for build/runtime logs."
          } >> "$GITHUB_STEP_SUMMARY"

