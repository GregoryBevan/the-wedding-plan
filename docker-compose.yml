services:
  db:
    image: postgres:18-alpine
    container_name: wedding-plan-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wedding_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  mailpit:
    image: axllent/mailpit:v1.27.4
    container_name: wedding-plan-mailpit
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"
